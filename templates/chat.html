<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat Bot with Markdown</title>
  <!-- Add Markdown parser library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
    }
    .chat-container {
      width: 600px;
      margin: 50px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    #chat-log {
      height: 650px;
      overflow-y: auto;
      padding: 20px;
      border-bottom: 1px solid #ccc;
    }
    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      max-width: 80%;
      clear: both;
    }
    .user {
      background-color: #DCF8C6;
      float: right;
      text-align: right;
    }
    .bot {
      background-color: #F1F0F0;
      float: left;
      text-align: left;
    }
    /* Add styles for markdown content */
    .bot pre {
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    .bot code {
      background-color: #f0f0f0;
      padding: 2px 4px;
      border-radius: 3px;
      font-family: monospace;
    }
    .bot blockquote {
      border-left: 3px solid #ccc;
      padding-left: 10px;
      margin-left: 5px;
      color: #555;
    }
    .bot table {
      border-collapse: collapse;
      width: 100%;
    }
    .bot th, .bot td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    .bot th {
      background-color: #f2f2f2;
    }
    .input-container {
      display: flex;
      padding: 10px;
    }
    #user-input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #send-btn {
      padding: 10px 20px;
      margin-left: 10px;
      font-size: 16px;
      background-color: #007BFF;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #send-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div id="chat-log">
      <!-- Chat messages will appear here -->
    </div>
    <div class="input-container">
      <input type="text" id="user-input" placeholder="Type your message here...">
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    // Configure marked options
    marked.setOptions({
      breaks: true,        // Enable line breaks
      gfm: true,           // Enable GitHub flavored markdown
      headerIds: false     // Disable header IDs to prevent potential XSS
    });

    // Function to add a message to the chat log
    function addMessage(sender, text) {
      const chatLog = document.getElementById("chat-log");
      const messageElem = document.createElement("div");
      messageElem.classList.add("message", sender);
      
      // If it's a bot message, parse the markdown
      if (sender === "bot") {
        messageElem.innerHTML = marked.parse(text);
      } else {
        // User messages stay as plain text
        messageElem.textContent = text;
      }
      
      chatLog.appendChild(messageElem);
      // Automatically scroll to the bottom of the chat log
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    // Function to send the message to the server
    function sendMessage() {
      const inputField = document.getElementById("user-input");
      const message = inputField.value.trim();
      if (!message) return; // Do nothing if input is empty

      // Display the user's message in the chat log
      addMessage("user", message);
      // Clear the input field
      inputField.value = "";

      // Send a POST request to the /chat endpoint
      fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
      })
      .then(response => response.json())
      .then(data => {
        // Append the bot's response to the chat log with markdown parsing
        addMessage("bot", data.response);
      })
      .catch(error => {
        console.error("Error:", error);
        addMessage("bot", "Sorry, there was an error processing your request.");
      });
    }

    // Add event listeners for button click and Enter key press
    document.getElementById("send-btn").addEventListener("click", sendMessage);
    document.getElementById("user-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    // Add a welcome message with markdown example
    window.onload = function() {
      const welcomeMessage = `How can I help you today?`;
      
      addMessage("bot", welcomeMessage);
    };
  </script>
</body>
</html>
